name: Boxer
options:
  bundleIdPrefix: com.steveshi
  deploymentTarget:
    macOS: "13.0"
  createIntermediateGroups: true
configs:
  Debug: debug
  Release: release
packages:
  Sparkle:
    url: https://github.com/sparkle-project/Sparkle
    from: 2.9.1
projectReferences:
  OpenEmuShaders:
    path: Vendor/OpenEmuShaders/OpenEmuShaders.xcodeproj
  MT32Emu:
    path: Vendor/MT32Emu/Boxer-MT32Emu.xcodeproj
  DDHidLib:
    path: Vendor/DDHidLib/DDHidLib.xcodeproj
settings:
  base:
    CLANG_CXX_LANGUAGE_STANDARD: gnu++20
    CLANG_CXX_LIBRARY: libc++
    CLANG_ENABLE_MODULES: YES
    CLANG_ENABLE_OBJC_ARC: YES
    GCC_C_LANGUAGE_STANDARD: gnu99
    SWIFT_VERSION: 6.0
    STRINGS_FILE_OUTPUT_ENCODING: binary
